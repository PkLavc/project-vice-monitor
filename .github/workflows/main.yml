name: Uptime Bot
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Check
        run: python monitor.py
        
      - name: Auto PR and Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash workflow.sh
